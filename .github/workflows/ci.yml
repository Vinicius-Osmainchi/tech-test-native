name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # Cria um container MySQL temporário dentro do GitHub Actions
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test_db
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    # Injeta as variáveis de ambiente para a pipeline inteira
    env:
      DATABASE_URL: "mysql://root:root@127.0.0.1:3306/test_db"
      JWT_SECRET: "test_secret"
      ADMIN_EMAIL: "admin@admin.com"
      ADMIN_PASSWORD: "admin"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install root dependencies
        run: npm install

      - name: Install backend dependencies
        run: npm --prefix backend install

      - name: Generate Prisma Client
        run: cd backend && npx prisma generate

      - name: Push Prisma Schema to Test DB
        # Sincroniza o banco de dados vazio com as tabelas do schema antes do teste
        run: cd backend && npx prisma db push 

      - name: Install frontend dependencies
        run: npm --prefix frontend install

      - name: Run Type Check
        run: npm run type-check

      - name: Run Linter Frontend
        run: npm --prefix frontend run lint

      - name: Run Tests Backend
        run: npm --prefix backend run test

      - name: Build
        run: npm run build